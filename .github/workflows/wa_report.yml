name: 📊 WA Logbook Report - Auto Send

on:
  schedule:
    # 09:00 WIB = 02:00 UTC
    - cron: '0 2 * * *'
    # 17:31 WIB = 10:31 UTC
    - cron: '31 10 * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  send-report:
    name: Send WA Logbook Report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: MP/MP/sap-input-app/package-lock.json

      - name: 📦 Install dependencies
        working-directory: MP/MP/sap-input-app
        run: |
          rm -f package-lock.json
          npm install

      - name: 🌐 Install Chrome (for PDF generation)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y google-chrome-stable
          which google-chrome-stable
          google-chrome-stable --version

      - name: 🔧 Patch Chrome path for Linux
        working-directory: MP/MP/sap-input-app
        run: |
          # Replace Windows Chrome path with Linux path in test_pdf_generator.js
          sed -i "s|C:\\\\\\\\Program Files\\\\\\\\Google\\\\\\\\Chrome\\\\\\\\Application\\\\\\\\chrome.exe|/usr/bin/google-chrome-stable|g" scripts/test_pdf_generator.js
          echo "Chrome path patched:"
          grep -n "chromePath" scripts/test_pdf_generator.js

      - name: 📤 Send WA Logbook Report (PDF)
        working-directory: MP/MP/sap-input-app
        run: node scripts/send_wa_daily.js
        env:
          VITE_SUPABASE_URL: https://pabnvxlvrussdfhisxzn.supabase.co
          VITE_SUPABASE_ANON_KEY: sb_publishable_btvgcbyES8_4w5x3dE-atg_kYfUAii4
          GOWA_URL: https://gowa.waterflai.my.id
          GOWA_USER: admin
          GOWA_PASS: Sedap321#
          TARGET_GROUP_JID: 120363430505509462@g.us
          TARGET_PHONE: "081251334618"

      - name: ✅ Done
        run: echo "WA Report dispatched successfully at $(date '+%Y-%m-%d %H:%M:%S') UTC"
